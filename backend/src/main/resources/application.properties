# Application
spring.application.name=ai-model-picker
# Render (and most PaaS) injects PORT; default to 8080 locally/in Docker
server.port=${PORT:8080}

# CORS — comma-separated origins, wildcards allowed (e.g. https://*.vercel.app)
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Admin API key — when set, /api/admin/** requires X-Admin-Key header
app.admin.api-key=${ADMIN_API_KEY:}

# SQLite JDBC datasource
spring.datasource.url=jdbc:sqlite:./data/ai_model_picker.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.com.aimodelpicker=DEBUG
