# Render Blueprint — deploys the Spring backend as a free Docker web service.
# Connect the GitHub repo at https://dashboard.render.com → New → Blueprint.
services:
  - type: web
    name: ai-model-picker-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/models
    envVars:
      # Set this to your real Vercel domain after the frontend deploys;
      # the wildcard also covers Vercel preview deployments.
      - key: ALLOWED_ORIGINS
        value: https://*.vercel.app,http://localhost:3000
      # Auto-generated secret guarding /api/admin/** (X-Admin-Key header).
      # Read the value in the Render dashboard → Environment.
      - key: ADMIN_API_KEY
        generateValue: true
      # MongoDB Atlas connection string — set in the Render dashboard.
      # Must include the database name: .../ai_model_picker?appName=Cluster24328
      - key: MONGODB_URI
        sync: false
